<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a73e8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ConstruApp">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <title>ConstruApp - APU Mobile</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles -->
    <style>
:root {
    /* Color Palette - Contemporary Light Theme with Construction Accents */
    --primary: #f59e0b; /* Amber/Orange - Construction vibe */
    --primary-dark: #d97706;
    --primary-light: #fef3c7;
    
    --bg-main: #f8fafc;
    --bg-surface: #ffffff;
    
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    
    --success: #10b981; /* Green for budget OK */
    --danger: #ef4444; /* Red for expenses */
    --info: #3b82f6;
    
    --border-color: #e2e8f0;
    
    /* Typography */
    --font-family: 'Inter', system-ui, -apple-system, sans-serif;
    
    /* Metrics & Spacing */
    --border-radius: 16px;
    --border-radius-sm: 8px;
    --border-radius-lg: 24px;
    --spacing-xs: 4px;
    --spacing-sm: 8px;
    --spacing-md: 16px;
    --spacing-lg: 24px;
    --spacing-xl: 32px;
    
    /* Shadows */
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    --shadow-fab: 0 10px 25px -5px rgba(245, 158, 11, 0.4);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: var(--font-family);
    background-color: var(--bg-main);
    color: var(--text-primary);
    overflow: hidden; /* Prevent body scrolling for app-like feel */
}

/* App Container (Mobile First) */
.app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 480px; /* Limit width on desktop to look like mobile */
    margin: 0 auto;
    background-color: var(--bg-main);
    position: relative;
    box-shadow: var(--shadow-lg);
}

/* Header */
.app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--spacing-md) var(--spacing-lg);
    background-color: var(--bg-surface);
    border-bottom: 1px solid var(--border-color);
    z-index: 10;
}

.header-left {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
}

.header-icon {
    color: var(--primary);
    width: 28px;
    height: 28px;
}

.header-title h1 {
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.2;
}

.header-title .subtitle {
    font-size: 0.8rem;
    color: var(--text-secondary);
}

.icon-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    padding: var(--spacing-sm);
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

.icon-btn:hover, .icon-btn:active {
    background-color: var(--bg-main);
    color: var(--primary);
}

/* Main Content Area */
.app-main {
    flex: 1;
    overflow-y: auto;
    padding: var(--spacing-md);
    padding-bottom: 90px; /* Space for bottom nav */
}

/* Bottom Navigation */
.bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background-color: var(--bg-surface);
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid var(--border-color);
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 20;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
}

.nav-item {
    background: none;
    border: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: var(--text-muted);
    font-size: 0.7rem;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.3s ease;
    flex: 1;
}

.nav-item i {
    width: 22px;
    height: 22px;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.nav-item.active {
    color: var(--primary);
}

.nav-item.active i {
    transform: translateY(-2px);
}

/* Floating Action Button */
.fab-container {
    position: relative;
    top: -25px;
    display: flex;
    justify-content: center;
}

.fab {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-fab);
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.fab:active {
    transform: scale(0.95);
}

.fab i {
    width: 26px;
    height: 26px;
}

/* General Layout & Cards */
.card {
    background-color: var(--bg-surface);
    border-radius: var(--border-radius);
    padding: var(--spacing-md);
    margin-bottom: var(--spacing-md);
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(0,0,0,0.02);
}

.card-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: var(--spacing-md);
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
}

/* Typography Helpers */
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-info { color: var(--info); }
.text-muted { color: var(--text-muted); }

/* Forms & Inputs */
.form-group {
    margin-bottom: var(--spacing-md);
}

.form-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: var(--spacing-xs);
}

.form-control {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-sm);
    font-family: var(--font-family);
    font-size: 1rem;
    color: var(--text-primary);
    background-color: var(--bg-main);
    transition: all 0.2s ease;
}

.form-control:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
    background-color: var(--bg-surface);
}

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px 20px;
    border-radius: var(--border-radius-sm);
    font-family: var(--font-family);
    font-weight: 600;
    font-size: 1rem;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-primary {
    background-color: var(--primary);
    color: white;
}

.btn-primary:active {
    background-color: var(--primary-dark);
}

.btn-outline {
    background-color: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
}

.btn-outline:active {
    background-color: var(--bg-main);
}

/* Modals */
.modal-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(15, 23, 42, 0.4);
    backdrop-filter: blur(4px);
    z-index: 50;
    display: flex;
    align-items: flex-end;
    opacity: 1;
    transition: opacity 0.3s ease;
}

.modal-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

.modal-content {
    background-color: var(--bg-surface);
    width: 100%;
    max-height: 90vh;
    border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
    padding: var(--spacing-lg) var(--spacing-md);
    transform: translateY(0);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
}

.modal-overlay.hidden .modal-content {
    transform: translateY(100%);
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--spacing-lg);
}

.modal-header h2 {
    font-size: 1.2rem;
    font-weight: 700;
}

.modal-close {
    background: var(--bg-main);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    cursor: pointer;
}

/* Custom Scrollbar */
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 10px;
}

/* Helpers */
.flex-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.mt-1 { margin-top: var(--spacing-sm); }
.mt-2 { margin-top: var(--spacing-md); }
.mb-1 { margin-bottom: var(--spacing-sm); }
.mb-2 { margin-bottom: var(--spacing-md); }

/* ==========================================
   Print Styles (PDF Export)
========================================== */
#print-report {
    display: none;
}

@media print {
    body * {
        visibility: hidden;
    }
    #print-report, #print-report * {
        visibility: visible;
    }
    #print-report {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        display: block;
        padding: 20px;
    }
    .print-header {
        margin-bottom: 20px;
        border-bottom: 2px solid #000;
        padding-bottom: 10px;
    }
    .print-summary {
        margin-bottom: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        font-size: 14px;
    }
    .print-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
    }
    .print-table th, .print-table td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: left;
    }
    .print-table th {
        background-color: #f5f5f5 !important;
        -webkit-print-color-adjust: exact;
    }
}

</style>

    <script>
// UUID generator
function generateUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
    });
}

class Store {
    constructor() {
        this.data = this.loadData();
    }

    loadData() {
        const defaultData = {
            projects: [],
            currentProjectId: null
        };
        let data = defaultData;
        try {
            const stored = localStorage.getItem('construapp_data');
            if (stored) data = JSON.parse(stored);
        } catch (e) {
            console.error("LocalStorage error", e);
            alert("No se pudo acceder a la memoria. Si abriste esto desde WhatsApp, por favor ábrelo en tu navegador Chrome o Safari.");
        }
        
        // Migrate data to new schema
        if (data.projects) {
            data.projects = data.projects.map(p => this.migrateProject(p));
        }
        return data;
    }

    saveData() {
        try {
            localStorage.setItem('construapp_data', JSON.stringify(this.data));
        } catch (e) {
            console.error("LocalStorage save error", e);
        }
    }

    migrateProject(p) {
        if (p.area === undefined) {
            p.area = 0;
        }
        if (!p.budgets) {
            p.budgets = [{ id: 'main', name: 'Presupuesto Principal', amount: p.budget || 0 }];
            if (p.extraBudget > 0) {
                p.budgets.push({ id: 'extra', name: 'Presupuesto Adicional', amount: p.extraBudget });
            }
            delete p.budget;
            delete p.extraBudget;
        }
        if (!p.incomes) p.incomes = [];
        if (!p.phases) {
            p.phases = [];
            if (p.progress && p.progress.length > 0) {
                p.phases.push({
                    id: 'general',
                    name: 'Avance General',
                    totalAmount: p.progress.reduce((sum, prog) => sum + prog.amount, 0),
                    unit: p.progress[0].unit || 'm²',
                    progress: p.progress
                });
            }
            delete p.progress;
        }
        if (p.expenses) {
            p.expenses.forEach(e => {
                if (!e.budgetId) e.budgetId = 'main';
            });
        }
        return p;
    }

    // Projects API
    createProject(name, initialBudget, area) {
        const newProject = {
            id: generateUUID(),
            name: name,
            budgets: [{ id: 'main', name: 'Presupuesto Principal', amount: parseFloat(initialBudget) || 0 }],
            area: parseFloat(area) || 0,
            incomes: [],
            pendingLabor: 0,
            expenses: [],
            phases: [],
            createdAt: new Date().toISOString()
        };
        this.data.projects.push(newProject);
        if (!this.data.currentProjectId) {
            this.data.currentProjectId = newProject.id;
        }
        this.saveData();
        return newProject;
    }

    editProject(id, name, area) {
        const project = this.data.projects.find(p => p.id === id);
        if (project) {
            project.name = name;
            project.area = parseFloat(area) || 0;
            this.saveData();
        }
    }

    getCurrentProject() {
        if (!this.data.currentProjectId) return null;
        return this.data.projects.find(p => p.id === this.data.currentProjectId);
    }

    setCurrentProject(id) {
        this.data.currentProjectId = id;
        this.saveData();
    }

    // Budgets API
    addBudget(name, amount) {
        const project = this.getCurrentProject();
        if (project) {
            project.budgets.push({
                id: generateUUID(),
                name: name,
                amount: parseFloat(amount) || 0
            });
            this.saveData();
        }
    }

    editBudget(id, name, amount) {
        const project = this.getCurrentProject();
        if (project) {
            const b = project.budgets.find(b => b.id === id);
            if (b) {
                b.name = name;
                b.amount = parseFloat(amount) || 0;
                this.saveData();
            }
        }
    }

    deleteBudget(id) {
        const project = this.getCurrentProject();
        if (project) {
            project.budgets = project.budgets.filter(b => b.id !== id);
            // Move expenses to main if budget is deleted
            project.expenses.forEach(e => {
                if (e.budgetId === id) e.budgetId = 'main';
            });
            this.saveData();
        }
    }

    getTotalBudget() {
        const project = this.getCurrentProject();
        if (!project) return 0;
        return project.budgets.reduce((sum, b) => sum + b.amount, 0);
    }

    // Incomes (Anticipos) API
    addIncome(description, amount) {
        const project = this.getCurrentProject();
        if (project) {
            project.incomes.push({
                id: generateUUID(),
                description: description,
                amount: parseFloat(amount) || 0,
                date: new Date().toISOString()
            });
            this.saveData();
        }
    }

    editIncome(id, description, amount) {
        const project = this.getCurrentProject();
        if (project) {
            const inc = project.incomes.find(i => i.id === id);
            if (inc) {
                inc.description = description;
                inc.amount = parseFloat(amount) || 0;
                this.saveData();
            }
        }
    }

    deleteIncome(id) {
        const project = this.getCurrentProject();
        if (project) {
            project.incomes = project.incomes.filter(i => i.id !== id);
            this.saveData();
        }
    }

    getTotalIncomes() {
        const project = this.getCurrentProject();
        if (!project) return 0;
        return project.incomes.reduce((sum, i) => sum + i.amount, 0);
    }

    // Pending Labor API
    setPendingLabor(amount) {
        const project = this.getCurrentProject();
        if (project) {
            project.pendingLabor = parseFloat(amount) || 0;
            this.saveData();
        }
    }

    // Expenses API
    addExpense(type, amount, description, budgetId) {
        const project = this.getCurrentProject();
        if (project) {
            project.expenses.push({
                id: generateUUID(),
                type: type,
                amount: parseFloat(amount) || 0,
                description: description,
                budgetId: budgetId || 'main',
                date: new Date().toISOString()
            });
            this.saveData();
        }
    }

    editExpense(expenseId, amount, description, budgetId) {
        const project = this.getCurrentProject();
        if (project) {
            const exp = project.expenses.find(e => e.id === expenseId);
            if (exp) {
                exp.amount = parseFloat(amount) || 0;
                exp.description = description;
                if (budgetId) exp.budgetId = budgetId;
                this.saveData();
            }
        }
    }

    deleteExpense(expenseId) {
        const project = this.getCurrentProject();
        if (project) {
            project.expenses = project.expenses.filter(e => e.id !== expenseId);
            this.saveData();
        }
    }

    getTotalExpenses() {
        const project = this.getCurrentProject();
        if (!project) return 0;
        return project.expenses.reduce((sum, exp) => sum + exp.amount, 0);
    }

    getExpensesByType(type) {
        const project = this.getCurrentProject();
        if (!project) return 0;
        return project.expenses.filter(e => e.type === type).reduce((sum, exp) => sum + exp.amount, 0);
    }

    exportBackup() {
        const dataStr = JSON.stringify(this.data);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ConstruApp_Backup_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    async restoreBackup(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed.projects) {
                        this.data = parsed;
                        this.saveData();
                        resolve(true);
                    } else {
                        reject(new Error("Formato inválido"));
                    }
                } catch (error) {
                    reject(error);
                }
            };
            reader.onerror = () => reject(new Error("Error leyendo archivo"));
            reader.readAsText(file);
        });
    }

    // Phases & Progress API
    addPhase(name, totalAmount, unit) {
        const project = this.getCurrentProject();
        if (project) {
            project.phases.push({
                id: generateUUID(),
                name: name,
                totalAmount: parseFloat(totalAmount) || 0,
                unit: unit,
                progress: []
            });
            this.saveData();
        }
    }

    editPhase(id, name, totalAmount, unit) {
        const project = this.getCurrentProject();
        if (project) {
            const phase = project.phases.find(p => p.id === id);
            if (phase) {
                phase.name = name;
                phase.totalAmount = parseFloat(totalAmount) || 0;
                phase.unit = unit;
                this.saveData();
            }
        }
    }

    deletePhase(id) {
        const project = this.getCurrentProject();
        if (project) {
            project.phases = project.phases.filter(p => p.id !== id);
            this.saveData();
        }
    }

    addProgressToPhase(phaseId, amount) {
        const project = this.getCurrentProject();
        if (project) {
            const phase = project.phases.find(p => p.id === phaseId);
            if (phase) {
                phase.progress.push({
                    id: generateUUID(),
                    amount: parseFloat(amount) || 0,
                    date: new Date().toISOString()
                });
                this.saveData();
            }
        }
    }

    editProgress(phaseId, progressId, amount) {
        const project = this.getCurrentProject();
        if (project) {
            const phase = project.phases.find(p => p.id === phaseId);
            if (phase) {
                const prog = phase.progress.find(p => p.id === progressId);
                if (prog) {
                    prog.amount = parseFloat(amount) || 0;
                    this.saveData();
                }
            }
        }
    }

    deleteProgress(phaseId, progressId) {
        const project = this.getCurrentProject();
        if (project) {
            const phase = project.phases.find(p => p.id === phaseId);
            if (phase) {
                phase.progress = phase.progress.filter(p => p.id !== progressId);
                this.saveData();
            }
        }
    }

    getCompletedPhases() {
        const project = this.getCurrentProject();
        if (!project) return [];
        return project.phases.filter(phase => {
            if (phase.totalAmount <= 0) return false;
            const currentProgress = phase.progress.reduce((s, p) => s + p.amount, 0);
            return currentProgress >= phase.totalAmount;
        });
    }

    getPhaseProgressAmount(phaseId) {
        const project = this.getCurrentProject();
        if (!project) return 0;
        const phase = project.phases.find(p => p.id === phaseId);
        if (!phase) return 0;
        return phase.progress.reduce((sum, p) => sum + p.amount, 0);
    }

    getTotalProgressAmount() {
        const project = this.getCurrentProject();
        if (!project) return 0;
        return project.phases.reduce((sum, phase) => {
            return sum + phase.progress.reduce((s, p) => s + p.amount, 0);
        }, 0);
    }

    getGlobalPhysicalProgressPercent() {
        const project = this.getCurrentProject();
        if (!project || project.phases.length === 0) return 0;
        
        let totalPercent = 0;
        let validPhases = 0;
        project.phases.forEach(phase => {
            if (phase.totalAmount > 0) {
                const phaseProgress = phase.progress.reduce((s, p) => s + p.amount, 0);
                const percent = Math.min((phaseProgress / phase.totalAmount), 1); // 0 to 1
                totalPercent += percent;
                validPhases++;
            }
        });
        
        if (validPhases === 0) return 0;
        return totalPercent / validPhases; // 0 to 1
    }

    getEarnedValue() {
        const totalBudget = this.getTotalBudget();
        const globalProgress = this.getGlobalPhysicalProgressPercent();
        return totalBudget * globalProgress;
    }

    // Dashboard Calculations
    getCostPerUnit() {
        const project = this.getCurrentProject();
        if (!project || !project.area || project.area <= 0) return 0;
        return this.getTotalExpenses() / project.area;
    }

    getBudgetPercentage() {
        const totalBudget = this.getTotalBudget();
        if (totalBudget === 0) return 0;
        const percentage = (this.getTotalExpenses() / totalBudget) * 100;
        return Math.min(percentage, 100);
    }
}

window.appStore = new Store();

</script>
    <script>
class AppUI {
    constructor(store) {
        this.store = store;
        this.currentView = 'dashboard';
        
        // DOM Elements
        this.mainContent = document.getElementById('main-content');
        this.modalOverlay = document.getElementById('modal-overlay');
        this.btnProjects = document.getElementById('btn-projects');
        this.fabAdd = document.getElementById('fab-add');
        this.navItems = document.querySelectorAll('.nav-item');
        this.projectNameDisplay = document.getElementById('current-project-name');

        this.printArea = document.createElement('div');
        this.printArea.id = 'print-report';
        document.body.appendChild(this.printArea);

        this.init();
    }

    init() {
        this.bindEvents();
        
        if (!this.store.data.projects || this.store.data.projects.length === 0) {
            this.showProjectsView();
        } else {
            this.updateHeader();
            this.renderView('dashboard');
        }
    }

    bindEvents() {
        this.navItems.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const view = e.currentTarget.dataset.view;
                this.navItems.forEach(n => n.classList.remove('active'));
                e.currentTarget.classList.add('active');
                this.renderView(view);
            });
        });

        this.fabAdd.addEventListener('click', () => {
            this.showAddMenuModal();
        });

        this.btnProjects.addEventListener('click', () => {
            this.showProjectsView();
        });

        this.modalOverlay.addEventListener('click', (e) => {
            if (e.target === this.modalOverlay) {
                this.closeModal();
            }
        });
    }

    updateHeader() {
        const project = this.store.getCurrentProject();
        if (project) {
            this.projectNameDisplay.textContent = project.name;
        } else {
            this.projectNameDisplay.textContent = 'Sin Proyecto Activo';
        }
    }

    formatCurrency(amount) {
        return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(amount);
    }

    formatNumber(num) {
        return new Intl.NumberFormat('es-MX', { maximumFractionDigits: 2 }).format(num);
    }

    // ==========================================
    // View Rendering
    // ==========================================

    renderView(viewName) {
        this.currentView = viewName;
        this.mainContent.innerHTML = '';

        const project = this.store.getCurrentProject();
        if (!project && viewName !== 'projects') {
            this.mainContent.innerHTML = `
                <div style="text-align:center; padding: 40px 20px;">
                    <i data-lucide="folder-plus" style="width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 16px;"></i>
                    <p style="color: var(--text-secondary);">Por favor crea o selecciona un proyecto para comenzar.</p>
                    <button class="btn btn-primary mt-2" onclick="app.showProjectsView()">Ver Proyectos</button>
                </div>
            `;
            if (typeof lucide !== 'undefined') lucide.createIcons();
            return;
        }

        switch(viewName) {
            case 'dashboard': this.renderDashboard(project); break;
            case 'expenses': this.renderExpenses(project); break;
            case 'progress': this.renderProgress(project); break;
            case 'reports': this.renderReports(project); break;
            case 'budget': this.renderBudget(project); break;
        }
        
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    renderDashboard(project) {
        const totalBudget = this.store.getTotalBudget();
        const totalExpenses = this.store.getTotalExpenses();
        const totalIncomes = this.store.getTotalIncomes();
        const budgetPercent = this.store.getBudgetPercentage();
        const totalProgress = this.store.getTotalProgressAmount();
        const apu = this.store.getCostPerUnit();

        let progressColor = budgetPercent > 90 ? 'var(--danger)' : (budgetPercent > 70 ? 'var(--primary)' : 'var(--success)');

        const totalMat = this.store.getExpensesByType('material');
        const totalLab = this.store.getExpensesByType('labor');

        this.mainContent.innerHTML = `
            <div class="card" style="background: linear-gradient(135deg, var(--bg-surface), #fffaf0);">
                <div class="flex-between mb-1">
                    <span style="color: var(--text-secondary); font-size: 0.9rem;">Presupuesto Consumido</span>
                    <span style="font-weight: 700; color: ${progressColor};">${budgetPercent.toFixed(1)}%</span>
                </div>
                <div style="width: 100%; background: var(--border-color); height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 16px;">
                    <div style="width: ${budgetPercent}%; background: ${progressColor}; height: 100%; transition: width 1s ease;"></div>
                </div>
                <div class="flex-between">
                    <div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">Gastos Materiales</div>
                        <div style="font-size: 1rem; font-weight: 700; color: #f59e0b;">${this.formatCurrency(totalMat)}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 0.75rem; color: var(--text-muted);">Mano de Obra</div>
                        <div style="font-size: 1rem; font-weight: 700; color: #3b82f6;">${this.formatCurrency(totalLab)}</div>
                    </div>
                </div>
                <div style="margin-top: 8px; border-top: 1px solid var(--border-color); padding-top: 8px;" class="flex-between">
                    <div style="font-size: 0.8rem; font-weight: 600;">Gasto Total:</div>
                    <div style="font-size: 1.1rem; font-weight: 800;">${this.formatCurrency(totalExpenses)}</div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                <div class="card" style="margin-bottom: 0;">
                    <i data-lucide="wallet" style="color: var(--success); margin-bottom: 8px;"></i>
                    <div style="font-size: 0.8rem; color: var(--text-muted);">Anticipos (Recibido)</div>
                    <div style="font-weight: 700; color: var(--success);">${this.formatCurrency(totalIncomes)}</div>
                    <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px;">Balance: ${this.formatCurrency(totalIncomes - totalExpenses)}</div>
                </div>
                <div class="card" style="margin-bottom: 0; cursor: pointer;" onclick="app.showEditPendingLaborModal()">
                    <i data-lucide="users" style="color: var(--primary); margin-bottom: 8px;"></i>
                    <div style="font-size: 0.8rem; color: var(--text-muted);">Mano de Obra</div>
                    <div style="font-weight: 600;">${project.expenses.filter(e=>e.type==='labor').length} reg.</div>
                    <div style="font-size: 0.75rem; color: var(--danger); margin-top: 4px; font-weight: 600;">Pendiente: ${this.formatCurrency(project.pendingLabor || 0)}</div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    <i data-lucide="activity" style="color: var(--primary);"></i>
                    Métricas Globales y APU
                </div>
                <div style="display: flex; align-items: center; justify-content: center; padding: 10px 0; flex-direction: column; border-bottom: 1px solid var(--border-color); margin-bottom: 12px; padding-bottom: 16px;">
                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px;">Costo Unitario por m² de Construcción</div>
                    <div style="font-size: 2.2rem; font-weight: 800; color: var(--text-primary); letter-spacing: -1px;">
                        ${this.formatCurrency(apu)} <span style="font-size: 1rem; color: var(--text-muted); font-weight: 500;">/ m²</span>
                    </div>
                </div>
                <div class="flex-between">
                    <div style="text-align: center; flex: 1; border-right: 1px solid var(--border-color);">
                        <div style="font-size: 0.75rem; color: var(--text-muted);">Área de Construcción</div>
                        <div style="font-size: 1.1rem; font-weight: 700; color: var(--text-primary);">${this.formatNumber(project.area || 0)} m²</div>
                    </div>
                    <div style="text-align: center; flex: 1;">
                        <div style="font-size: 0.75rem; color: var(--text-muted);">Avance Financiero</div>
                        <div style="font-size: 1.1rem; font-weight: 700; color: var(--primary);">${budgetPercent.toFixed(1)}%</div>
                    </div>
                </div>
            </div>

            <!-- EARNED VALUE MANAGEMENT -->
            ${this.renderEVMCard()}
        `;
    }    renderEVMCard() {
        const incomes = this.store.getTotalIncomes();
        const ac = this.store.getTotalExpenses();
        const profit = incomes - ac;
        const profitMargin = incomes > 0 ? (profit / incomes) * 100 : 0;
        
        // "si el mismo baja al menos del 10 porciento debe colocarlo en rojo"
        const isGood = profitMargin >= 10;
        const color = isGood ? 'var(--success)' : 'var(--danger)';
        const icon = isGood ? 'trending-up' : 'trending-down';
        const message = isGood ? 'Margen de ganancia mayor al 10%' : 'Alerta: Ganancia menor al 10%';

        return `
            <div class="card" style="border-left: 4px solid ${color};">
                <div class="flex-between mb-2">
                    <div class="card-title" style="margin-bottom: 0;">Análisis de Rentabilidad</div>
                    <i data-lucide="${icon}" style="color: ${color};"></i>
                </div>
                
                <div class="flex-between" style="margin-bottom: 8px;">
                    <div style="font-size: 0.8rem; color: var(--text-muted);">Anticipos Recibidos (Ingresos)</div>
                    <div style="font-size: 1rem; font-weight: 700; color: var(--text-primary);">${this.formatCurrency(incomes)}</div>
                </div>
                <div class="flex-between" style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color);">
                    <div style="font-size: 0.8rem; color: var(--text-muted);">Costo Real (Gasto Actual)</div>
                    <div style="font-size: 1rem; font-weight: 700; color: var(--text-primary);">${this.formatCurrency(ac)}</div>
                </div>
                <div class="flex-between">
                    <div style="font-size: 0.85rem; font-weight: 700; color: ${color};">Ganancia Real:</div>
                    <div style="font-size: 1.1rem; font-weight: 800; color: ${color};">${this.formatCurrency(profit)} (${profitMargin.toFixed(1)}%)</div>
                </div>
                <div style="text-align: right; font-size: 0.75rem; color: ${color}; margin-top: 4px;">
                    ${message}
                </div>
            </div>
        `;
    }

    renderExpenses(project) {
        const expenses = project.expenses.slice().reverse();
        
        let html = `
            <div class="flex-between mb-2">
                <div class="card-title" style="margin-bottom: 0;">Historial de Gastos</div>
                <div style="display:flex; gap: 8px; align-items:center;">
                    <button class="icon-btn" style="border: 1px solid var(--border-color);" onclick="app.showPDFOptionsModal()" title="Generar Informe PDF">
                        <i data-lucide="printer" style="width:16px;height:16px; color: var(--text-secondary);"></i>
                    </button>
                    <div style="background: var(--bg-surface); padding: 8px 12px; border-radius: var(--border-radius-sm); border: 1px solid var(--danger); display: flex; align-items: center; gap: 8px; cursor: pointer;" onclick="app.showEditPendingLaborModal()">
                        <div>
                            <div style="font-size: 0.7rem; color: var(--text-muted);">Pendiente M. Obra</div>
                            <div style="font-size: 0.9rem; font-weight: 700; color: var(--danger);">${this.formatCurrency(project.pendingLabor || 0)}</div>
                        </div>
                        <i data-lucide="edit-2" style="width: 14px; height: 14px; color: var(--danger);"></i>
                    </div>
                </div>
            </div>
        `;

        if (expenses.length === 0) {
            html += `<p style="color: var(--text-muted); text-align: center; padding: 20px;">No hay gastos registrados.</p>`;
        } else {
            html += `<div style="display: flex; flex-direction: column; gap: 12px;">`;
            expenses.forEach(exp => {
                const date = new Date(exp.date).toLocaleDateString();
                const isMaterial = exp.type === 'material';
                const icon = isMaterial ? 'package' : 'users';
                const color = isMaterial ? '#f59e0b' : '#3b82f6';
                const budget = project.budgets.find(b => b.id === exp.budgetId);
                const budgetName = budget ? budget.name : 'Presupuesto';

                html += `
                    <div onclick="app.showEditExpenseModal('${exp.id}')" style="cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--bg-surface); border-radius: var(--border-radius-sm); border: 1px solid var(--border-color); transition: background 0.2s ease;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div style="background: ${color}20; color: ${color}; padding: 10px; border-radius: 50%;">
                                <i data-lucide="${icon}" style="width: 20px; height: 20px;"></i>
                            </div>
                            <div>
                                <div style="font-weight: 600; font-size: 0.95rem;">${exp.description}</div>
                                <div style="font-size: 0.7rem; color: var(--text-muted);">${date} • ${budgetName}</div>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div style="font-weight: 700; color: var(--danger);">-${this.formatCurrency(exp.amount)}</div>
                            <i data-lucide="chevron-right" style="width: 16px; height: 16px; color: var(--text-muted);"></i>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
        }
        
        this.mainContent.innerHTML = html;
    }

    renderProgress(project) {
        let html = `
            <div class="flex-between mb-2">
                <div class="card-title" style="margin-bottom: 0;">Fases de Obra</div>

                    </button>
                    <button class="btn btn-primary" style="width: auto; padding: 6px 12px; font-size: 0.8rem;" onclick="app.showAddPhaseModal()">

            project.phases.forEach(phase => {
                const totalProgress = this.store.getPhaseProgressAmount(phase.id);
                const percent = phase.totalAmount > 0 ? Math.min((totalProgress / phase.totalAmount) * 100, 100) : 0;
                const pending = Math.max(phase.totalAmount - totalProgress, 0);
                
                html += `
                    <div class="card">
                        <div class="flex-between mb-1">

                            </div>
                        </div>
                        
                        <div class="flex-between" style="font-size: 0.8rem; margin-bottom: 4px;">
                            <span style="color: var(--text-secondary);">Progreso: ${this.formatNumber(totalProgress)} / ${this.formatNumber(phase.totalAmount)} ${phase.unit}</span>
                            <span style="font-weight: 700; color: var(--success);">${percent.toFixed(1)}%</span>
                        </div>
                        
                        <div style="width: 100%; background: var(--border-color); height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 12px;">

                        </div>
                        
                        <div class="flex-between mb-2" style="font-size: 0.8rem;">

                            <div class="flex-between mb-1">
                                <span style="font-size: 0.75rem; font-weight: 600; color: var(--text-secondary);">REGISTROS DE AVANCE</span>
                                <button class="btn btn-primary" style="width: auto; padding: 4px 8px; font-size: 0.7rem;" onclick="app.showAddProgressToPhaseModal('${phase.id}')">
                                    <i data-lucide="plus" style="width:12px;height:12px;"></i> Añadir
                                </button>
                            </div>
                            ${phase.progress.length === 0 ? '<div style="font-size: 0.75rem; color: var(--text-muted);">Sin registros aún.</div>' : ''}
                            ${phase.progress.slice().reverse().map(prog => `

                                        <span style="font-weight: 600; color: var(--success);">+${this.formatNumber(prog.amount)} ${phase.unit}</span>
                                        <i data-lucide="edit-2" style="width:12px;height:12px; cursor:pointer; color:var(--text-muted);" onclick="app.showEditProgressModal('${phase.id}', '${prog.id}')"></i>

                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        }
        this.mainContent.innerHTML = html;
    }

            <div class="card">

                            <div style="font-weight: 700; font-size: 0.9rem;">${labPercent.toFixed(1)}%</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3 style="margin: 0 0 16px 0; font-size: 1rem;">Desempeño (Anticipos vs Gasto)</h3>
                <div style="margin-bottom: 8px;">
                    <div class="flex-between" style="font-size: 0.8rem; margin-bottom: 4px;">
                        <span>Anticipos Recibidos</span>
                        <span style="font-weight: 700; color: var(--success);">${this.formatCurrency(totalIncomes)}</span>
                    </div>
                    <div style="width: 100%; background: var(--border-color); height: 12px; border-radius: 6px; overflow: hidden;">
                        <div style="width: ${Math.min((totalIncomes / (Math.max(totalIncomes, ac) || 1)) * 100, 100)}%; background: var(--success); height: 100%;"></div>
                    </div>
                </div>
                <div>
                    <div class="flex-between" style="font-size: 0.8rem; margin-bottom: 4px;">
                        <span>Gasto Real (Costo)</span>
                        <span style="font-weight: 700; color: var(--danger);">${this.formatCurrency(ac)}</span>
                    </div>
                    <div style="width: 100%; background: var(--border-color); height: 12px; border-radius: 6px; overflow: hidden;">
                        <div style="width: ${Math.min((ac / (Math.max(totalIncomes, ac) || 1)) * 100, 100)}%; background: var(--danger); height: 100%;"></div>
                    </div>
                </div>
                <div style="margin-top: 16px; text-align: center; font-size: 0.9rem;">
                    <strong>Ganancia Real:</strong> <span style="color: ${profit >= 0 ? 'var(--success)' : 'var(--danger)'}">${this.formatCurrency(profit)}</span>

                <div class="flex-between mb-2">

                </div>
                <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:12px;">Partidas con 100% de ejecución física.</div>
                ${completedPhases.length === 0 ? '<div style="text-align:center; color:var(--text-muted); font-size:0.8rem; padding: 10px;">No hay partidas al 100% aún.</div>' : ''}
                <div style="display:flex; flex-direction:column; gap:8px;">
                    ${completedPhases.map(p => `
                        <div style="background:var(--bg-default); border:1px solid var(--border-color); padding:8px 12px; border-radius:var(--border-radius-sm); display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <div style="font-size:0.85rem; font-weight:600;">${p.name}</div>
                                <div style="font-size:0.75rem; color:var(--text-muted);">${p.totalAmount} ${p.unit}</div>
                            </div>
                            <i data-lucide="check-circle" style="color:var(--success); width:18px; height:18px;"></i>

                <div style="display: flex; flex-direction: column; gap: 8px;">
                    ${project.incomes.map(i => `

                                <div style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">${i.description}</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted);">${new Date(i.date).toLocaleDateString()}</div>
                            </div>
                            <div style="display:flex; align-items: center; gap: 8px;">

                                <i data-lucide="edit-2" style="width:14px;height:14px; cursor:pointer; color:var(--text-muted);" onclick="app.showEditIncomeModal('${i.id}')"></i>

    showProjectsView() {
        this.navItems.forEach(n => n.classList.remove('active'));
        this.currentView = 'projects';
        
        const projects = this.store.data.projects;
        let html = `
            <div class="card" style="background: var(--bg-surface);">
                <div style="font-size: 0.9rem; font-weight: 600; margin-bottom: 8px;"><i data-lucide="database" style="width:16px;height:16px; vertical-align:text-bottom;"></i> Respaldo de Datos (Nube/Local)</div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-outline" style="flex:1; font-size:0.8rem; padding:8px;" onclick="app.store.exportBackup()"><i data-lucide="download"></i> Guardar</button>
                    <button class="btn btn-outline" style="flex:1; font-size:0.8rem; padding:8px;" onclick="document.getElementById('backup-upload').click()"><i data-lucide="upload"></i> Restaurar</button>
                    <input type="file" id="backup-upload" style="display:none;" accept=".json" onchange="app.handleRestoreBackup(event)">
                </div>
            </div>

            <div class="flex-between mb-2 mt-4">
                <h2 style="font-size: 1.5rem; font-weight: 700;">Tus Proyectos</h2>
                <button class="btn btn-primary" style="width: auto; padding: 10px 16px;" onclick="app.showCreateProjectModal()">
                    <i data-lucide="plus"></i> Nuevo
                </button>
            </div>
        `;

        if (projects.length === 0) {
            html += `
                <div style="text-align: center; padding: 40px 20px; background: var(--bg-surface); border-radius: var(--border-radius);">
                    <i data-lucide="hard-hat" style="width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 16px;"></i>
                    <p style="color: var(--text-secondary);">No tienes proyectos. Crea uno nuevo para empezar.</p>
                </div>
            `;
        } else {
            html += `<div style="display: flex; flex-direction: column; gap: 16px;">`;
            projects.forEach(p => {
                const isActive = p.id === this.store.data.currentProjectId;
                const totalBudget = p.budgets.reduce((s,b)=>s+b.amount, 0);
                html += `
                    <div class="card" style="margin-bottom: 0; cursor: pointer; border: 2px solid ${isActive ? 'var(--primary)' : 'transparent'};" onclick="app.selectProject('${p.id}')">
                        <div class="flex-between mb-1">
                            <div style="font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 8px;">
                                ${p.name}
                                <i data-lucide="edit" style="width: 16px; height: 16px; color: var(--text-muted); cursor: pointer;" onclick="event.stopPropagation(); app.showEditProjectModal('${p.id}')"></i>
                            </div>
                            ${isActive ? '<span style="background: var(--primary-light); color: var(--primary-dark); font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; font-weight: 600;">Activo</span>' : ''}
                        </div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary);" class="flex-between">
                            <span>Presupuesto: ${this.formatCurrency(totalBudget)}</span>
                            <span>Área: ${p.area || 0} m²</span>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
        }

        this.mainContent.innerHTML = html;
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    selectProject(id) {
        this.store.setCurrentProject(id);
        this.updateHeader();
        this.navItems[0].click();
    }

    async handleRestoreBackup(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (confirm("Restaurar un respaldo reemplazará los proyectos actuales. ¿Continuar?")) {
            try {
                await this.store.restoreBackup(file);
                alert("Respaldo restaurado con éxito.");
                this.updateHeader();
                this.showProjectsView();
            } catch(error) {
                alert("Error al restaurar: " + error.message);
            }
        }
        e.target.value = '';
    }

    // ==========================================
    // Modals & Handlers
    // ==========================================

    openModal(html) {
        this.modalOverlay.innerHTML = `<div class="modal-content" onclick="event.stopPropagation()">${html}</div>`;
        this.modalOverlay.classList.remove('hidden');
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    closeModal() {
        this.modalOverlay.classList.add('hidden');
        setTimeout(() => { this.modalOverlay.innerHTML = ''; }, 300);
    }

    // --- Create Project ---
    showCreateProjectModal() {
        this.openModal(`
            <div class="modal-header"><h2>Nuevo Proyecto</h2><button class="modal-close" onclick="app.closeModal()"><i data-lucide="x"></i></button></div>
            <div class="form-group"><label class="form-label">Nombre de la Obra</label><input type="text" id="inp-proj-name" class="form-control" placeholder="Ej. Casa Valle"></div>
            <div class="form-group"><label class="form-label">Presupuesto Principal ($)</label><input type="number" id="inp-proj-budget" class="form-control" placeholder="0.00"></div>
            <div class="form-group"><label class="form-label">Metros Cuadrados de Construcción (m²)</label><input type="number" id="inp-proj-area" class="form-control" placeholder="Ej. 150"></div>
            <button class="btn btn-primary" onclick="app.handleCreateProject()">Crear Proyecto</button>
        `);
    }
    handleCreateProject() {
        const name = document.getElementById('inp-proj-name').value;
        const budget = document.getElementById('inp-proj-budget').value;
        const area = document.getElementById('inp-proj-area').value;
        if (!name) return alert('El nombre es requerido');
        this.store.createProject(name, budget, area);
        this.closeModal();
        this.updateHeader();
        this.navItems[0].click();
    }

    // --- Edit Project ---
    showEditProjectModal(id) {
        const project = this.store.data.projects.find(p => p.id === id);
        if (!project) return;
        this.openModal(`
            <div class="modal-header"><h2>Editar Proyecto</h2><button class="modal-close" onclick="app.closeModal()"><i data-lucide="x"></i></button></div>
            <div class="form-group"><label class="form-label">Nombre de la Obra</label><input type="text" id="inp-edit-proj-name" class="form-control" value="${project.name}"></div>
            <div class="form-group"><label class="form-label">Metros Cuadrados de Construcción (m²)</label><input type="number" id="inp-edit-proj-area" class="form-control" value="${project.area || 0}"></div>
            <button class="btn btn-primary" onclick="app.handleEditProject('${id}')">Guardar Cambios</button>
        `);
    }
    handleEditProject(id) {
        const name = document.getElementById('inp-edit-proj-name').value;
        const area = document.getElementById('inp-edit-proj-area').value;
        if (!name) return alert('El nombre es requerido');
        this.store.editProject(id, name, area);
        this.closeModal();
        this.updateHeader();
        this.showProjectsView();
    }

        if (!this.store.getCurrentProject()) return alert("Primero selecciona o crea un proyecto.");

                <button class="card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; margin: 0; cursor: pointer; border: none; background: #eff6ff;" onclick="app.showAddExpenseModal('labor')">
                    <i data-lucide="users" style="width: 32px; height: 32px; color: var(--info); margin-bottom: 12px;"></i><span style="font-weight: 600; color: var(--text-primary);">Mano de Obra</span>

            <div class="form-group"><label class="form-label">A qué presupuesto cargarlo</label><select id="inp-exp-budget" class="form-control" style="appearance:auto;">${this.getBudgetOptionsHtml()}</select></div>

    showImportCSVModal() {

            <div class="modal-header">
                <h2>Importar Partidas (CSV)</h2>
                <button class="modal-close" onclick="app.closeModal()"><i data-lucide="x"></i></button>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px;">El archivo CSV desde Excel debe tener 3 columnas (sin encabezado):<br><code>Nombre, Cantidad, Unidad</code><br>Ejemplo: <code>Muros de Block, 150, m2</code></p>
            <div class="form-group">
                <input type="file" id="csv-upload" class="form-control" accept=".csv">
            </div>
            <button class="btn btn-primary" onclick="app.handleImportCSV()">Importar</button>
        `);
    }

    handleImportCSV() {
        const fileInput = document.getElementById('csv-upload');
        const file = fileInput.files[0];
        if (!file) return alert('Selecciona un archivo CSV');
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const text = e.target.result;
            const lines = text.split('\\n');
            let count = 0;
            lines.forEach(line => {
                if (line.trim() === '') return;
                const parts = line.split(',');
                if (parts.length >= 3) {
                    const name = parts[0].trim();
                    const total = parts[1].trim();
                    const unit = parts[2].trim();
                    if (name && total && !isNaN(parseFloat(total))) {
                        this.store.addPhase(name, total, unit);
                        count++;
                    }
                }
            });
            this.closeModal();
            alert(`Se importaron ${count} partidas con éxito.`);
            this.renderView('progress');
        };
        reader.readAsText(file);
    }

                    <thead><tr><th>Fecha</th><th>Concepto</th><th>Monto</th></tr></thead>
                    <tbody>
                        ${project.incomes.map(i => `<tr><td>${new Date(i.date).toLocaleDateString()}</td><td>${i.description}</td><td style="text-align:right;">${this.formatCurrency(i.amount)}</td></tr>`).join('')}
                    </tbody>
                </table>
            `;
        }

        const materials = project.expenses.filter(e => e.type === 'material').sort((a,b) => new Date(a.date) - new Date(b.date));
        if (incMat && materials.length > 0) {
            html += `
                <h3 style="border-bottom: 2px solid #000; padding-bottom: 5px; margin-top: 30px;">Desglose de Gastos: Materiales</h3>
                <table class="print-table">
                    <thead><tr><th>Fecha</th><th>Descripción</th><th>Monto</th></tr></thead>
                    <tbody>
                        ${materials.map(e => `<tr><td>${new Date(e.date).toLocaleDateString()}</td><td>${e.description}</td><td style="text-align:right;">${this.formatCurrency(e.amount)}</td></tr>`).join('')}
                    </tbody>
                </table>
            `;
        }

        const labor = project.expenses.filter(e => e.type === 'labor').sort((a,b) => new Date(a.date) - new Date(b.date));
        if (incLab && labor.length > 0) {
            html += `
                <h3 style="border-bottom: 2px solid #000; padding-bottom: 5px; margin-top: 30px;">Desglose de Gastos: Mano de Obra</h3>
                <table class="print-table">
                    <thead><tr><th>Fecha</th><th>Descripción</th><th>Monto</th></tr></thead>
                    <tbody>
                        ${labor.map(e => `<tr><td>${new Date(e.date).toLocaleDateString()}</td><td>${e.description}</td><td style="text-align:right;">${this.formatCurrency(e.amount)}</td></tr>`).join('')}
                    </tbody>
                </table>
            `;
        }

        if (incComp) {
            html += `
                <h3 style="border-bottom: 2px solid #000; padding-bottom: 5px; margin-top: 30px;">Partidas Listas para Cobro (100% Completadas)</h3>
                ${completedPhases.length === 0 ? '<p>No hay partidas completadas al 100% hasta la fecha.</p>' : `
                <table class="print-table">
                    <thead>
                        <tr>
                            <th>Partida (Fase)</th>
                            <th>Cantidad Total Ejecutada</th>
                            <th>Unidad</th>
                            <th>Estatus</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${completedPhases.map(p => `
                            <tr>
                                <td>${p.name}</td>
                                <td style="text-align:center;">${p.totalAmount}</td>
                                <td style="text-align:center;">${p.unit}</td>
                                <td style="text-align:center; font-weight:bold; color:green;">100% Lista</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                `}
            `;
        }
        
        this.printArea.innerHTML = html;
        setTimeout(() => {
            window.print();
        }, 100);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    window.app = new AppUI(window.appStore);
});

</script>

            lucide.createIcons();
